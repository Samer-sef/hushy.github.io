<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hushy — White Noise for Sleep & Focus</title>
  <meta name="description" content="Hushy is a simple white noise app for sleep, focus, and relaxation." />
  <meta name="theme-color" content="#3C2260" />
  <link rel="icon" href="assets/hushy-icon-small.png" type="image/png" />
  <link rel="apple-touch-icon" href="assets/hushy-icon-large.png" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="landing-body">
  <main class="landing">
    <nav class="topbar">
      <a class="brand" href="index.html" aria-label="Hushy home">
        <img src="assets/hushy-icon-small.png" alt="" />
        <span>Hushy</span>
      </a>

      <div class="nav-links">
        <a href="privacy.html">Privacy</a>
        <a href="terms.html">Terms</a>
      </div>
    </nav>

    <section class="hero">
      <img class="app-icon" src="assets/hushy-icon-large.png" alt="Hushy app icon" />

      <h1>Hushy: White Noise & Sleep</h1>
      <p class="subtitle">
        Hushy helps you relax, focus, and fall asleep with soothing sounds,
        custom mixes, and simple timers.
      </p>

      <div class="store-row">
        <a class="store-button primary" href="#">
          <small>Download on the</small>
          <strong>App Store</strong>
        </a>

        <a class="store-button secondary" href="#">
          <small>Get it on</small>
          <strong>Google Play</strong>
        </a>
      </div>

    </section>

    <section class="showcase" aria-labelledby="showcase-title">

      <div class="showcase-stage" aria-label="App preview gallery">
        <figure class="showcase-card card-curated">
          <img src="assets/feature-curated.png" alt="Hushy home screen with curated sounds and presets." />
          <figcaption>Curated suggestions</figcaption>
        </figure>

        <figure class="showcase-card card-mix">
          <img src="assets/feature-mix.png" alt="Hushy mix screen with sound controls and sliders." />
          <figcaption>Build custom mixes</figcaption>
        </figure>

        <figure class="showcase-card card-sleep">
          <img src="assets/feature-sleep.png" alt="Hushy preset screen with timer and playback controls." />
          <figcaption>Sleep-friendly timers</figcaption>
        </figure>

        <figure class="showcase-card card-history">
          <img src="assets/feature-history.png" alt="Hushy history screen showing listening sessions and calendar." />
          <figcaption>Track your history</figcaption>
        </figure>

        <figure class="showcase-card card-favourites">
          <img src="assets/feature-favourites.png" alt="Hushy screen highlighting saved favourite presets and sounds." />
          <figcaption>Save favourites</figcaption>
        </figure>

        <figure class="showcase-card card-theme">
          <img src="assets/feature-theme.png" alt="Hushy settings screens showing different customizable themes." />
          <figcaption>Customize your theme</figcaption>
        </figure>
      </div>
    </section>

    <footer class="landing-footer">
      <span>© 2026 Hushy</span>
      <span>•</span>
      <a href="privacy.html">Privacy Policy</a>
      <span>•</span>
      <a href="terms.html">Terms of Use</a>
    </footer>
  </main>
</body>
</html>
